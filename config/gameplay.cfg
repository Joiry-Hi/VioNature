# =============================================================================
#  VioNature gameplay tuning
# =============================================================================
#  Format: key = value
#  Unknown or invalid keys are ignored.
#  Booleans accept: true / false / 1 / 0 / yes / no / on / off.
# =============================================================================


# =============================================================================
#  1. Game mode & map selection
# =============================================================================

# Game mode: survival (waves + bosses) | duel (1v1 AI duelist) | tutorial (no enemies, weapon tips)
game_mode = survival

# Boss rush: when true, only bosses spawn at their scheduled times — no regular
# enemies, no scripted events, no boss support spawns.  No effect in duel mode.
boss_rush_mode = false

# Map type: circle | square_obstacle | square (alias) | asteroid | hollow_world
map_type = hollow_world


# =============================================================================
#  2. Map geometry
# =============================================================================

