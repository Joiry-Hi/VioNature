# ---------------------------------------------------------------------------
# 12. 无人机（火箭筒副模式，长按右键打开指挥界面）
# ---------------------------------------------------------------------------

# 部署仓发射速度（m/s），弹道为抛物线（惯性+重力弧线）
drone_canister_speed = 26.0

# 部署仓重力系数（0=无重力直线，越大弧线越弯）
drone_canister_gravity = 0.45

# 同时存在的最大无人机数量（最小 1，无上限）
drone_max_count = 3

# 无人机激活后存活时间（秒）
drone_lifetime = 30.0

# 部署仓落地后激活延迟（秒）
drone_deploy_time = 1.0

# 无人机悬停目标高度（米），复用飞行装置弹簧-阻尼器力学
drone_hover_altitude = 4.5

# 无人机水平追踪速度（m/s）
drone_move_speed = 5.5

# 机枪子弹单发伤害
drone_bullet_damage = 0.28

# 机枪子弹飞行速度（m/s）
drone_bullet_speed = 65.0

# 机枪射击间隔（秒），越小射速越高
drone_shoot_interval = 0.08

# 机枪开火最大距离（米），超出此距离不射击
drone_shoot_range = 16.0

# 火箭发射间隔（秒）
drone_rocket_interval = 2.2

# 火箭发射最大距离（米），超出此距离不发射
drone_rocket_range = 28.0

# -------- 鸟群算法（Boids Flocking）--------
# 分离半径（米）：无人机在此距离内互相推开，防止重叠
drone_separation_radius = 4.0

# 分离力强度：推开力度，越大分离越强烈
drone_separation_force = 15.0

# 集群半径（米）：凝聚+对齐的有效范围
drone_flocking_radius = 14.0

# 集群力强度：凝聚+对齐的力度（保持较低，让寻敌行为占主导）
drone_flocking_force = 3.5

# -------- 集合点指挥 --------
# 集合点驻守时间（秒）：无人机全部到齐后在此等待，之后恢复正常寻敌
drone_rally_hold_time = 2.5

# 指挥界面标识浮空高度（米）：瞄准标识距地图表面的高度，范围 0.2~20.0
drone_rally_marker_altitude = 2.0

# ---------------------------------------------------------------------------
# 13. 调试与辅助
# ---------------------------------------------------------------------------
# 无敌模式：开启后玩家不受敌人接触/弹幕伤害
invincible = false
