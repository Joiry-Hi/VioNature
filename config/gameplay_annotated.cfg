# ---------------------------------------------------------------------------
# 10. 无限手套
# ---------------------------------------------------------------------------
# 闪现传送距离（米）
blink_distance = 12.0
# 闪现落地后敌人清除半径（米，范围内的敌人被击飞）
blink_clear_radius = 8.0
# 是否启用在时间内
time_stop_enabled = true
# 是否启用闪现
blink_enabled = true


# ---------------------------------------------------------------------------
# 11. 敌人参数
# ---------------------------------------------------------------------------

# 敌方弹幕伤害
enemy_shot_damage = 1.0
# 敌方弹幕速度（m/s）
enemy_shot_speed = 12.0

