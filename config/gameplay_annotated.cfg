# -------- Harrier 骚扰者 --------
# 射击间隔（秒）
harrier_fire_interval = 1.65
# 飞行速度（m/s）
harrier_speed = 6.8
# 悬停目标高度（米）
harrier_target_height = 5.8

# -------- Blinker 闪烁者 --------
# 闪烁前摇/预警时间（秒）
blinker_windup = 0.55
