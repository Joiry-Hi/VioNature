# =============================================================================
#  VioNature 游戏参数配置（中文标注版）
# =============================================================================
#  格式：key = value
#  注释：以 # 开头的行为注释，不影响游戏运行
#  布尔值：true/false, 1/0, yes/no, on/off 均可
#  修改后重新启动游戏即可生效
# =============================================================================


# ---------------------------------------------------------------------------
# 1. 游戏模式与地图
# ---------------------------------------------------------------------------

# 游戏模式
#   survival - 生存模式：波次递增的敌人潮 + 脚本事件 + Boss 战
#   duel     - 决斗模式：1v1 对战 AI 决斗者（禁用普通敌人波次刷新）
game_mode = duel

# 地图类型
#   circle          - 经典圆形竞技场
#   square_obstacle - 方形竞技场，含障碍物和多层浮空平台
#   square          - square_obstacle 的别名
#   asteroid        - 球形小行星表面，重力指向球心
#   hollow_world    - 空心球壳内侧，重力指向球壳外（朝球心方向是"上"）
map_type = hollow_world


# ---------------------------------------------------------------------------
# 2. 圆形地图参数（仅 map_type = circle 时生效）
# ---------------------------------------------------------------------------
# 圆形竞技场半径（米）
circle_radius = 100.0


# ---------------------------------------------------------------------------
# 3. 小行星地图参数（仅 map_type = asteroid 时生效）
# ---------------------------------------------------------------------------
# 小行星球面半径（米）
asteroid_radius = 200.0
# 玩家站在球面外侧的默认高度（米）
asteroid_player_altitude = 2.0
# 敌人站在球面外侧的默认高度（米）
asteroid_enemy_altitude = 0.8
# 超出此距离的敌人/弹幕会被拉回或移除（米）
asteroid_cleanup_distance = 200.0


# ---------------------------------------------------------------------------
# 4. 空心世界地图参数（仅 map_type = hollow_world 时生效）
# ---------------------------------------------------------------------------
# 空心球壳内半径（米）
hollow_world_radius = 100.0
# 玩家站在球壳内侧的默认距离（米，从球壳向内）
hollow_world_player_altitude = 2.0
# 敌人站在球壳内侧的默认距离（米）
hollow_world_enemy_altitude = 0.8
# 超出此距离的实体会被拉回或移除（米）
hollow_world_cleanup_distance = 200.0


# ---------------------------------------------------------------------------
# 5. 玩家移动与重力
# ---------------------------------------------------------------------------
# 默认重力加速度（m/s²）
gravity = 24.0
# 太空服装备后的重力倍率（越小越轻，0.24 约为月球重力感）
space_suit_gravity_scale = 0.24
# 步行速度（m/s）
walk_speed = 7.2
# 跑步速度（m/s，按住 Shift）
run_speed = 11.0
# 地面加速度（m/s²，值越大起速越快）
ground_acceleration = 28.0
# 空中加速度（m/s²，Quake 风格：空中加速远慢于地面）
air_acceleration = 8.0
# 跳跃初速度（m/s）
jump_speed = 9.0


# ---------------------------------------------------------------------------
# 6. 飞行装置参数（拾取后生效，空格升高 / Ctrl 降低）
# ---------------------------------------------------------------------------
# 悬停弹簧强度（值越大，高度修正越猛）
flight_hover_strength = 18.0
# 悬停阻尼系数（值越大，上下摆动越少）
flight_hover_damping = 7.5
# 上升/下降速度（m/s）
flight_vertical_speed = 7.0
# 最低飞行高度（米）
flight_min_altitude = 2.0
# 最高飞行高度（米）
flight_max_altitude = 18.0


# ---------------------------------------------------------------------------
# 7. 滑板参数（拾取后生效）
# ---------------------------------------------------------------------------
# 地面摩擦系数（越小越滑，0.08 几乎无摩擦）
skates_ground_friction = 0.08
# 空中控制力（越大空中转向越灵敏）
skates_air_control = 0.65
# 最高速度加成倍率
skates_max_speed_bonus = 3


# ---------------------------------------------------------------------------
# 8. 武器伤害与移动技巧参数
# ---------------------------------------------------------------------------

# -------- 激光步枪 --------
# 连射模式单发伤害
dagger_damage = 1.0
# 蓄力光束基础伤害（随蓄力时间线性增长到此值）
laser_base_damage = 1.6
# 蓄力光束额外伤害（满蓄力时附加）
laser_charge_damage = 5.0

# -------- 霰弹枪 --------
# 散射模式伤害（9 发弹丸，此为每发伤害）
scatter_damage = 0.55
# 单颗弹丸伤害（主模式）
shotgun_pellet_damage = 0.42
# 霰弹枪反冲冲量（发射后自身后退的力度）
shotgun_recoil_impulse = 13.0
# 霰弹枪反冲的垂直分量加成
shotgun_recoil_vertical_bonus = 5.5
# 玻璃碎片伤害（副模式，5 发弹跳碎片）
glass_shard_damage = 0.78
# 玻璃碎片速度（m/s）
glass_shard_speed = 72.0
# 玻璃碎片反冲缩放（相对于主模式反冲的倍率）
glass_shard_recoil_scale = 0.72

# -------- 火箭筒 --------
# 火箭弹直接命中伤害
rocket_impact_damage = 1.2
# 火箭爆炸伤害
rocket_explosion_damage = 4.0
# 火箭爆炸半径（米）
rocket_explosion_radius = 3.4
# 火箭跳冲量（自身受到的爆炸推力）
rocket_jump_impulse = 18.0
# 火箭跳触发半径（米，玩家在此范围内会受到推力）
rocket_jump_radius = 5.2

# -------- 火焰喷射器 --------
# 火焰弹伤害（主模式）
flame_damage = 0.38
# 热浪冲击波伤害（副模式，锥形近身）
heatwave_damage = 0.16
# 热浪推力
heatwave_force = 20.0
# 热浪最大射程（米）
heatwave_range = 7.5

# -------- 反冲长矛 --------
# 投掷长矛伤害
recoil_lance_damage = 3.2
# 投掷长矛速度（m/s）
recoil_lance_speed = 92.0
# 投掷后自身反冲冲量
recoil_lance_impulse = 20.0
# 音速推进伤害（副模式，锥形）
recoil_lance_thrust_damage = 1.65
# 音速推进推力
recoil_lance_thrust_force = 50.0
# 音速推进范围（米）
recoil_lance_thrust_range = 6.8
# 音速推进反冲冲量
recoil_lance_thrust_impulse = 50.0
# 长矛落地冲击波伤害
recoil_lance_shockwave_damage = 0.9
# 长矛落地冲击波推力
recoil_lance_shockwave_force = 20.0
# 长矛落地冲击波半径（米）
recoil_lance_shockwave_radius = 5.6

# -------- 裂隙切割者 --------
# 刀波伤害/秒（主模式，新月形能量波）
rift_cutter_damage = 50
# 刀波射程（米，传统槽位，当前不核心）
rift_cutter_range = 10.0
# 刀波宽度（米）
rift_cutter_width = 0.75
# 刀波飞行持续时间（秒）
rift_cutter_lifetime = 3.00
# 刀波预警延迟（秒，射击后等待此时间才产生伤害）
rift_cutter_delay = 0.5
# 新月形刀波半径（米）
rift_cutter_radius = 3.4
# 新月形刀波厚度（米，环形宽度）
rift_cutter_thickness = 1.05
# 刀波平面容差厚度（米，增大则更容易命中）
rift_cutter_plane_thickness = 0.95
# 刀波前进速度（m/s）
rift_cutter_wave_speed = 18.0
# 刀波生成位置距枪口的距离（米）
rift_cutter_wave_spawn_distance = 1.4

# 纳米平台参数（副模式）
# 平台投放距离（米）
rift_platform_range = 12.0
# 平台生成预警延迟（秒）
rift_platform_delay = 0.45
# 平台持续时间（秒）
rift_platform_lifetime = 20.0
# 平台边长（米，正方形平台）
rift_platform_size = 5.0
# 平台厚度（米）
rift_platform_thickness = 0.45


# ---------------------------------------------------------------------------
# 9. 重力钉枪与黑洞手雷
# ---------------------------------------------------------------------------
# 重力钉伤害（主模式）
gravity_nail_damage = 0.8
# 重力井牵引半径（米）
gravity_well_radius = 5.0
# 重力井牵引力
gravity_well_force = 16.0
# 重力井持续时间（秒）
gravity_well_lifetime = 3.2

# 黑洞手雷伤害（副模式）
black_hole_grenade_damage = 0.35
# 黑洞牵引半径（米）
black_hole_radius = 7.0
# 黑洞牵引力
black_hole_force = 36.0
# 黑洞持续时间（秒）
