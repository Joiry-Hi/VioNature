# =============================================================================
#  VioNature gameplay tuning
# =============================================================================
#  Format: key = value
#  Unknown or invalid keys are ignored.
#  Booleans accept: true / false / 1 / 0 / yes / no / on / off.
# =============================================================================


# =============================================================================
#  1. Game mode & map selection
# =============================================================================

# Game mode: survival (waves + bosses) | duel (1v1 AI duelist) | tutorial (no enemies, weapon tips)
game_mode = survival

# Boss rush: when true, only bosses spawn at their scheduled times — no regular
# enemies, no scripted events, no boss support spawns.  No effect in duel mode.
boss_rush_mode = false

# Map type: circle | square_obstacle | square (alias) | asteroid | hollow_world
map_type = circle


# =============================================================================
#  2. Map geometry
# =============================================================================

# --- circle ---
circle_radius = 50.0

# --- asteroid ---
asteroid_radius              = 50.0
asteroid_player_altitude     = 2.0
asteroid_enemy_altitude      = 0.8
asteroid_cleanup_distance    = 200.0

# --- hollow_world ---
hollow_world_radius           = 50.0
hollow_world_player_altitude  = 2.0
hollow_world_enemy_altitude   = 0.8
hollow_world_cleanup_distance = 200.0


# =============================================================================
#  3. Player movement
# =============================================================================

gravity                  = 5.0
space_suit_gravity_scale = 0.24
walk_speed               = 7.2
run_speed                 = 11.0
ground_acceleration       = 28.0
air_acceleration          = 8.0
jump_speed                = 9.0


# =============================================================================
