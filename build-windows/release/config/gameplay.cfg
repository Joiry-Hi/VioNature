# VioNature gameplay tuning.
# Format: key = value
# Unknown or invalid entries are ignored.
# Booleans accept: true/false, 1/0, yes/no, on/off.

# ---------------------------------------------------------------------------
# Mode and map
# ---------------------------------------------------------------------------
# Options:
#   survival - wave survival with events and boss spawn.
#   duel     - one-on-one PvE mirror duel; disables normal wave spawning.
game_mode = survival

# Options:
#   circle          - classic round arena.
#   square_obstacle - square arena with geometric obstacles and floating platforms.
#   square          - alias of square_obstacle.
#   asteroid        - spherical asteroid arena with gravity toward the planet center.
#   hollow_world    - hollow sphere arena; gravity pulls outward toward the inner shell.
map_type = hollow_world

# Circle map tuning. Only used when map_type = circle.
circle_radius = 50.0

# Asteroid map tuning. Only used when map_type = asteroid.
# radius: planet surface radius.
# player_altitude/enemy_altitude: default standing height above the spherical surface.
# cleanup_distance: far-away enemies/projectiles are pulled back or removed.
# Nano platform altitude is inferred in-game from aim direction and platform range.
asteroid_radius = 50.0
asteroid_player_altitude = 2.0
asteroid_enemy_altitude = 0.8
asteroid_cleanup_distance = 200.0

# Hollow world tuning. Only used when map_type = hollow_world.
# radius: inner shell radius.
# player_altitude/enemy_altitude: distance inward from the shell surface.
# cleanup_distance: deep-center/outside-shell entities are pulled back or removed.
hollow_world_radius = 300.0
hollow_world_player_altitude = 2.0
hollow_world_enemy_altitude = 0.8
hollow_world_cleanup_distance = 200.0

# ---------------------------------------------------------------------------
# Player movement and gravity
# ---------------------------------------------------------------------------
# gravity: default downward acceleration.
# space_suit_gravity_scale: multiplier after picking up the space suit.
# walk/run speed: horizontal movement targets.
gravity = 5.0
space_suit_gravity_scale = 0.24
walk_speed = 7.2
run_speed = 11.0
ground_acceleration = 28.0
air_acceleration = 8.0
jump_speed = 9.0

# Flight rig and skates pickups.
# flight_* controls hover altitude spring/damping and Space/Ctrl altitude changes.
# skates_* controls how much ground friction/input control changes after pickup.
flight_hover_strength = 18.0
flight_hover_damping = 7.5
flight_vertical_speed = 7.0
flight_min_altitude = 2.0
flight_max_altitude = 18.0
skates_ground_friction = 0.08
skates_air_control = 0.65
skates_max_speed_bonus = 3

# ---------------------------------------------------------------------------
# Player weapon damage and movement tech
# ---------------------------------------------------------------------------
# dagger_damage: rapid laser-gun projectile damage.
# laser_*: charged laser beam damage.
# shotgun_recoil_* and rocket_jump_* tune movement tricks.
dagger_damage = 1.0
scatter_damage = 0.55
laser_base_damage = 1.6
laser_charge_damage = 50.0
flame_damage = 0.38
rocket_impact_damage = 1.2
rocket_explosion_damage = 4.0
rocket_explosion_radius = 3.4
shotgun_pellet_damage = 0.75
shotgun_recoil_impulse = 13.0
shotgun_recoil_vertical_bonus = 5.5
rocket_jump_impulse = 18.0
rocket_jump_radius = 5.2

# ---------------------------------------------------------------------------
# Enemy, wave, boss, and duel tuning
# ---------------------------------------------------------------------------
# enemy_shot_* applies to Spitter/Boss/Duelist/Harrier basic enemy projectiles.
# harrier_* controls the fast airborne circling enemy.
# blinker_* controls the warning-teleport-dash enemy.
# boss_spawn_time only matters in survival mode.
# duelist_* and duel_* only matter in duel mode.
enemy_shot_damage = 1.0
enemy_shot_speed = 12.0
spitter_fire_interval = 1.85
pouncer_leap_interval = 2.4
pouncer_leap_speed = 15.5
harrier_fire_interval = 1.65
harrier_speed = 6.8
harrier_target_height = 5.8
blinker_windup = 0.55
blinker_cooldown = 2.4
blinker_dash_speed = 17.0
boss_spawn_time = 30.0
boss_health = 80.0
duelist_health = 42.0
duelist_weapon_switch_min = 2.0
duelist_weapon_switch_max = 4.0
duelist_fire_rate_scale = 1.0
duel_player_armor = 2
duel_armor_hit_invuln = 0.75

# ---------------------------------------------------------------------------
# Gravity nailer and black hole grenade
# ---------------------------------------------------------------------------
# gravity_well_* controls the normal nail gravity field.
# black_hole_event_horizon_radius: pure black center radius; touching it kills.
gravity_nail_damage = 0.8
gravity_well_radius = 5.0
gravity_well_force = 16.0
gravity_well_lifetime = 3.2
black_hole_grenade_damage = 0.35
black_hole_radius = 7.0
black_hole_force = 36.0
black_hole_lifetime = 3.8
black_hole_event_horizon_radius = 1.05

# ---------------------------------------------------------------------------
# Alternate weapon modes and special weapons
# ---------------------------------------------------------------------------
# heatwave_* controls flamethrower alternate mode.
# glass_shard_* controls shotgun alternate mode.
# recoil_lance_* controls weapon 7:
#   damage/speed/impulse        - thrown lance projectile and player recoil.
#   thrust_*                    - alternate held-lance sonic cone mode.
#   shockwave_*                 - radial push/damage when a thrown lance strikes ground.
# rift_cutter_* controls weapon 8 nano-controller blade wave:
#   range/width         - legacy compatibility slots; currently not central to the new blade wave.
#   wave_speed          - forward speed after the warning delay.
#   wave_spawn_distance - warning slash distance in front of muzzle.
#   lifetime            - active flight duration after delay.
#   delay               - warning time before the blade wave launches.
#   radius/thickness    - crescent shape size.
#   plane_thickness     - forgiving hit thickness around the crescent plane.
# rift_platform_* controls weapon 8 alternate mode:
#   range/thickness/size - placement distance and generated square platform shape.
#   delay                - warning time before platform becomes solid.
#   lifetime             - solid platform duration in seconds.
heatwave_damage = 0.16
heatwave_force = 20.0
heatwave_range = 7.5
glass_shard_damage = 0.78
glass_shard_speed = 72.0
glass_shard_recoil_scale = 0.72
recoil_lance_damage = 3.2
recoil_lance_speed = 92.0
recoil_lance_impulse = 20.0
recoil_lance_thrust_damage = 1.65
recoil_lance_thrust_force = 50.0
recoil_lance_thrust_range = 6.8
recoil_lance_thrust_impulse = 50.0
recoil_lance_shockwave_damage = 0.9
recoil_lance_shockwave_force = 20.0
recoil_lance_shockwave_radius = 5.6
rift_cutter_damage = 50
rift_cutter_range = 10.0
rift_cutter_width = 0.75
rift_cutter_lifetime = 3.00
rift_cutter_delay = 0.5
rift_cutter_radius = 3.4
rift_cutter_thickness = 1.05
rift_cutter_plane_thickness = 0.95
rift_cutter_wave_speed = 18.0
rift_cutter_wave_spawn_distance = 1.4
rift_platform_range = 12.0
rift_platform_delay = 0.45
rift_platform_lifetime = 20.0
rift_platform_size = 5.0
rift_platform_thickness = 0.45

# ---------------------------------------------------------------------------
# Infinity gauntlet
# ---------------------------------------------------------------------------
# blink_distance: teleport distance.
# blink_clear_radius: enemy clear radius after teleport.
# time_stop_enabled/blink_enabled can disable either gauntlet power.
blink_distance = 12.0
blink_clear_radius = 8.0
time_stop_enabled = true
blink_enabled = true

# ---------------------------------------------------------------------------
# Drone (rocket launcher alt-fire)
# ---------------------------------------------------------------------------
# canister_speed: launch speed of the drone canister projectile.
# canister_gravity: gravity factor applied to the canister (arc steepness).
drone_canister_speed = 13.0
drone_canister_gravity = 0.45

# max_count: maximum simultaneous drones (1-6).
drone_max_count = 10

# lifetime: how long a drone lives after activation (seconds).
drone_lifetime = 300.0

# deploy_time: delay between canister landing and drone activation (seconds).
drone_deploy_time = 1.0

# hover_altitude: target height the drone maintains above ground/surface.
drone_hover_altitude = 4.5

# move_speed: horizontal movement speed toward target (m/s).
drone_move_speed = 20

# bullet_damage: damage per machine-gun bullet.
drone_bullet_damage = 0.28


# bullet_speed: machine-gun bullet velocity (m/s).
drone_bullet_speed = 65.0

# shoot_interval: time between machine-gun shots (seconds).
drone_shoot_interval = 0.08

# shoot_range: max distance to begin firing the machine gun.
drone_shoot_range = 16.0

# rocket_interval: time between rocket launches (seconds).
drone_rocket_interval = 2.2

# rocket_range: max distance to launch rockets.
drone_rocket_range = 28.0

# Flocking behavior (boids algorithm) to reduce drone clustering.
# separation_radius: push-away range between drones.
# separation_force: push-away strength.
# flocking_radius: cohesion + alignment range.
# flocking_force: cohesion + alignment strength (keep low, pursuit dominates).
drone_separation_radius = 10.0
drone_separation_force = 15.0
drone_flocking_radius = 30.0
drone_flocking_force = 3.5

# rally_hold_time: how long drones must hold at a rally point (seconds).
drone_rally_hold_time = 2.5

# ---------------------------------------------------------------------------
# Debug and accessibility
# ---------------------------------------------------------------------------
# invincible: player ignores enemy contact/projectile deaths.
invincible = true
