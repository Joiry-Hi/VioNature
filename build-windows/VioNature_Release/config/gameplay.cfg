# =============================================================================
#  VioNature 游戏参数配置（中文标注版）
# =============================================================================
#  格式：key = value
#  注释：以 # 开头的行为注释，不影响游戏运行
#  布尔值：true / false / 1 / 0 / yes / no / on / off 均可
#  修改后重新启动游戏即可生效
# =============================================================================


# =============================================================================
#  1. 游戏模式与地图选择
# =============================================================================

# 游戏模式  survival（生存：波次递增 + Boss 战）| duel（1v1 AI 决斗者）
game_mode = duel

# Boss Rush：开启后仅 Boss 按各自时间生成，无小怪、无脚本事件、无 Boss 护卫。
# 对 duel 模式无影响。
boss_rush_mode = false

# 地图类型  circle | square_obstacle | square（别名）| asteroid | hollow_world
map_type = hollow_world


# =============================================================================
#  2. 地图几何参数
# =============================================================================

# --- 圆形竞技场 ---
circle_radius = 100.0                               # 圆形竞技场半径（米）

# --- 小行星表面 ---
asteroid_radius              = 200.0                # 球面半径（米）
asteroid_player_altitude     = 2.0                  # 玩家站在球面外侧的高度（米）
asteroid_enemy_altitude      = 0.8                  # 敌人站在球面外侧的高度（米）
asteroid_cleanup_distance    = 200.0                # 超出此距离的实体被拉回/移除

# --- 空心球壳 ---
hollow_world_radius           = 100.0               # 球壳内半径（米）
hollow_world_player_altitude  = 2.0                 # 玩家距球壳内侧的距离（米）
hollow_world_enemy_altitude   = 0.8                 # 敌人距球壳内侧的距离（米）
hollow_world_cleanup_distance = 200.0               # 超出此距离的实体被拉回/移除


# =============================================================================
#  3. 玩家移动
# =============================================================================

gravity                  = 24.0                     # 默认重力加速度（m/s²）
space_suit_gravity_scale = 0.24                     # 太空服重力倍率（0.24=月球感）
walk_speed               = 7.2                      # 步行速度（m/s）
run_speed                 = 11.0                    # 跑步速度（m/s, Shift）
ground_acceleration       = 28.0                    # 地面加速度（m/s²）
air_acceleration          = 8.0                     # 空中加速度（Quake 风格，远慢于地面）
jump_speed                = 9.0                     # 跳跃初速度（m/s）


# =============================================================================
#  4. 拾取物 — 飞行装置 & 滑板
# =============================================================================

flight_hover_strength  = 18.0                      # 悬停弹簧强度（值越大修正越猛）
flight_hover_damping   = 7.5                       # 悬停阻尼（值越大摆动越少）
flight_vertical_speed  = 7.0                       # 上升/下降速度（m/s, Space / Ctrl）
flight_min_altitude    = 2.0                       # 最低飞行高度（米）
flight_max_altitude    = 18.0                      # 最高飞行高度（米）

skates_ground_friction  = 0.08                     # 地面摩擦（越小越滑）
skates_air_control      = 0.65                     # 空中转弯灵敏度
skates_max_speed_bonus  = 3                        # 最高速度加成倍率


# =============================================================================
#  5. 武器参数（按武器 1-8 排列，每把分主/副模式）
# =============================================================================

# ---------- 5a. 激光步枪（武器 1）----------

dagger_damage       = 1.0                          # 主模式：连射弹伤害
scatter_damage      = 0.55
laser_base_damage   = 1.6                          # 副模式：蓄力光束基础伤害
laser_charge_damage = 5.0                          # 副模式：满蓄力额外伤害
laser_beam_radius   = 0.35                         # 激光束基础半径（随蓄力增大，最小 0.05）

# ---------- 5b. 火焰喷射器（武器 2）----------

flame_damage    = 0.38                             # 主模式：火焰弹
heatwave_damage = 0.16                             # 副模式：热浪冲击波
heatwave_force  = 20.0                             # 热浪推力
heatwave_range  = 7.5                              # 热浪射程（米）

# ---------- 5c. 火箭筒（武器 3）----------

rocket_impact_damage     = 1.2                     # 主模式：火箭弹直接命中
rocket_explosion_damage  = 4.0                     # 火箭爆炸伤害
rocket_explosion_radius  = 3.4                     # 爆炸半径（米）
rocket_jump_impulse      = 18.0                    # 火箭跳自身推力
rocket_jump_radius       = 5.2                     # 火箭跳触发半径（米）

# 无人机副模式参数见第 9 节。

