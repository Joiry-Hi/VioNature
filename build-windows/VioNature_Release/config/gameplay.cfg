rift_cutter_wave_spawn_distance = 1.4              # 生成位置距枪口距离（米）

rift_platform_range      = 12.0                   # 副模式：纳米平台投放距离（米）
rift_platform_delay      = 0.45                   # 生成预警延迟（秒）
