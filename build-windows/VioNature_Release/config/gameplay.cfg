shotgun_recoil_impulse        = 13.0               # 射击反冲冲量
shotgun_recoil_vertical_bonus = 5.5                # 反冲垂直分量加成

glass_shard_damage       = 0.78                    # 副模式：玻璃碎片伤害
glass_shard_speed        = 72.0                    # 碎片飞行速度（m/s）
glass_shard_recoil_scale = 0.72                    # 碎片反冲倍率

# ---------- 5e. 重力钉枪（武器 5）----------

gravity_nail_damage   = 0.8                        # 主模式：重力钉伤害
gravity_well_radius   = 5.0                        # 重力井牵引半径（米）
gravity_well_force    = 16.0                       # 重力井牵引力
gravity_well_lifetime = 3.2                        # 重力井持续时间（秒）

black_hole_grenade_damage       = 0.35             # 副模式：黑洞手雷伤害
black_hole_radius               = 7.0              # 黑洞牵引半径（米）
black_hole_force                = 36.0             # 黑洞牵引力
black_hole_lifetime             = 3.8              # 黑洞持续时间（秒）
black_hole_event_horizon_radius = 1.05             # 事件视界半径（米，进入即死）

# ---------- 5f. 无限手套（武器 6）----------

blink_distance      = 12.0                         # 闪现传送距离（米）
blink_clear_radius  = 8.0                         # 闪现落地后清除半径（米）
time_stop_enabled   = true                          # 启用时间停止
blink_enabled       = true                          # 启用闪现

# ---------- 5g. 反冲长矛（武器 7）----------

recoil_lance_damage             = 3.2              # 主模式：投掷伤害
recoil_lance_speed              = 92.0             # 投掷速度（m/s）
recoil_lance_impulse            = 20.0             # 投掷反冲冲量

recoil_lance_thrust_damage      = 1.65             # 副模式：音速推进伤害
recoil_lance_thrust_force       = 50.0             # 推进力
recoil_lance_thrust_range       = 6.8              # 推进范围（米）
recoil_lance_thrust_impulse     = 50.0             # 推进反冲冲量

recoil_lance_shockwave_damage   = 0.9              # 落地冲击波伤害
recoil_lance_shockwave_force    = 20.0             # 冲击波推力
recoil_lance_shockwave_radius   = 5.6              # 冲击波半径（米）

# ---------- 5h. 裂隙切割者（武器 8）----------

rift_cutter_damage              = 50               # 主模式：刀波伤害/秒
rift_cutter_range               = 10.0             # 刀波射程（米）
rift_cutter_width               = 0.75             # 刀波宽度（米）
